<!DOCTYPE html>
<html>
<head>
  <title>Juego Cazando</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="cazando.css">
</head>
<body>
 
  <div class="stars"></div>
 
  <div class="contenedor">
    <div class="titulo-wrap">
      <h1>🐱 CAZANDO</h1>
      <p class="autor">by Sonicse</p>
    </div>
 
    <div class="game-wrap">
      <canvas id="areaJuego" width="500" height="500"></canvas>
      <div class="scanlines"></div>
    </div>
 
    <div class="panel">
      <div class="stat-box">
        <span class="stat-label">PUNTOS</span>
        <span class="stat-value" id="puntos">0</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">TIEMPO</span>
        <span class="stat-value" id="tiempo">15</span>
      </div>
    </div>
 
    <div class="controles">
      <div class="btn-row">
        <button class="btn-dir" onclick="moverArriba()">▲</button>
      </div>
      <div class="btn-row">
        <button class="btn-dir" onclick="moverIzquierda()">◀</button>
        <button class="btn-dir" onclick="moverAbajo()">▼</button>
        <button class="btn-dir" onclick="moverDerecha()">▶</button>
      </div>
    </div>
 
    <button class="btn-reiniciar" onclick="reiniciarJuego()">↺ REINICIAR</button>
 
    <p id="mensaje"></p>
  </div>
 
  <script src="cazando.js"></script>
 
</body>
</html>
